workflows:
  # ─────────────────────────────────────────────
  # ANDROID — Play Store (Internal / Production)
  # ─────────────────────────────────────────────
  android-release:
    name: Diario Scuola Plus — Android
    max_build_duration: 45
    instance_type: linux_x2
    environment:
      android_signing:
        - diario
      vars:
        PACKAGE_NAME: "com.diarioscuolaplus.app"
        GOOGLE_PLAY_TRACK: internal
      node: 20
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: release/*
          include: true
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web app
        script: npm run build
      - name: Generate icons and splash
        script: npm run assets:generate
      - name: Sync Capacitor Android
        script: npx cap sync android
      - name: Set Android SDK location
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Build release AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/logs/*
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: $GOOGLE_PLAY_TRACK
        submit_as_draft: true

  # ─────────────────────────────────────────────
  # iOS — App Store / TestFlight
  # ─────────────────────────────────────────────
  ios-release:
    name: Diario Scuola Plus — iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "Ikonet Solutions"
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.diarioscuolaplus.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6790534929"
        BUNDLE_ID: "com.diarioscuolaplus.app"
      node: 20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: release/*
          include: true
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web app
        script: npm run build
      - name: Add iOS platform if missing
        script: |
          if [ ! -d "ios/App" ]; then
            npx cap add ios
          fi
      - name: Generate icons and splash
        script: npm run assets:generate
      - name: Patch Info.plist permissions
        script: bash scripts/patch-ios-plist.sh
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set build number
        script: |
          if [ -n "$APP_STORE_APPLE_ID" ] && [ "$APP_STORE_APPLE_ID" != "0000000000" ]; then
            LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" || echo 0)
            BUILD_NUMBER=$((LATEST + 1))
          else
            BUILD_NUMBER=$BUILD_NUMBER
          fi
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/App/App/Info.plist 2>/dev/null || true
      - name: Verify iOS bundle identifier
        script: |
          DETECTED=$(xcode-project detect-bundle-id --project ios/App/App.xcodeproj)
          echo "Bundle ID rilevato: $DETECTED"
          if [ "$DETECTED" != "$BUNDLE_ID" ]; then
            echo "ERRORE: bundle ID atteso $BUNDLE_ID, trovato $DETECTED"
            exit 1
          fi
      - name: Apply provisioning profiles
        script: xcode-project use-profiles --project ios/App/App.xcodeproj
      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true

  # ─────────────────────────────────────────────
  # WEB — Privacy policy + app demo (Vercel alt.)
  # ─────────────────────────────────────────────
  web-static:
    name: Diario Scuola Plus — Web Static
    max_build_duration: 15
    instance_type: linux_x2
    environment:
      node: 20
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install and build
        script: |
          npm ci
          npm run build
      - name: Verify legal pages
        script: |
          test -f dist/privacy-policy.html || (echo "privacy-policy.html mancante" && exit 1)
          test -f dist/terms.html || (echo "terms.html mancante" && exit 1)
          echo "OK: pagine legali presenti in dist/"
    artifacts:
      - dist/**/*
